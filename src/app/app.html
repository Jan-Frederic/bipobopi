<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Dino Jump Game</title>
  <style>
    body {
      margin: 0;
      padding: 0;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      background-color: #222;
      font-family: Arial, sans-serif;
    }
    canvas {
      border: 2px solid white;
      background-color: #f0f0f0;
    }
    #gameInfo {
      position: absolute;
      top: 20px;
      left: 20px;
      color: white;
      font-size: 20px;
    }
    #gameOver {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      background: rgba(0,0,0,0.9);
      color: white;
      padding: 40px;
      border-radius: 10px;
      text-align: center;
      display: none;
      z-index: 10;
    }
  </style>
</head>
<body>
  <div id="gameInfo">Score: <span id="score">0</span></div>
  <div id="gameOver">
    <h1>Game Over!</h1>
    <p>Score: <span id="finalScore">0</span></p>
    <p>Press R to Restart</p>
  </div>
  <canvas id="gameCanvas" width="800" height="400"></canvas>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');
    
    // Game objects
    const dino = { x: 50, y: 0, width: 40, height: 50, velocityY: 0, jumping: false };
    const ground = 300;
    const gravity = 0.6;
    const jumpPower = -15;
    
    let obstacles = [];
    let score = 0;
    let gameActive = true;
    let gameSpeed = 5;
    
    // Input handling
    document.addEventListener('keydown', (e) => {
      if (e.key === ' ') {
        if (!dino.jumping && gameActive) {
          dino.velocityY = jumpPower;
          dino.jumping = true;
        }
      }
      if (e.key === 'r' || e.key === 'R') {
        if (!gameActive) restart();
      }
    });

    function restart() {
      dino.x = 50;
      dino.y = 0;
      dino.velocityY = 0;
      dino.jumping = false;
      obstacles = [];
      score = 0;
      gameActive = true;
      gameSpeed = 5;
      document.getElementById('gameOver').style.display = 'none';
      gameLoop();
    }

    function update() {
      // Apply gravity
      dino.velocityY += gravity;
      dino.y += dino.velocityY;
      
      // Ground collision
      if (dino.y + dino.height >= ground) {
        dino.y = ground - dino.height;
        dino.velocityY = 0;
        dino.jumping = false;
      }
      
      // Spawn obstacles
      if (Math.random() < 0.01 * gameSpeed / 5) {
        obstacles.push({ x: canvas.width, y: ground - 30, width: 30, height: 30 });
      }
      
      // Update obstacles
      for (let i = obstacles.length - 1; i >= 0; i--) {
        obstacles[i].x -= gameSpeed;
        
        // Check collision
        if (checkCollision(dino, obstacles[i])) {
          gameActive = false;
          endGame();
        }
        
        // Remove off-screen obstacles and increase score
        if (obstacles[i].x < -obstacles[i].width) {
          obstacles.splice(i, 1);
          score += 10;
          gameSpeed = 5 + Math.floor(score / 100);
        }
      }
      
      document.getElementById('score').textContent = score;
    }

    function checkCollision(rect1, rect2) {
      return rect1.x < rect2.x + rect2.width &&
           rect1.x + rect1.width > rect2.x &&
           rect1.y < rect2.y + rect2.height &&
           rect1.y + rect1.height > rect2.y;
    }

    function draw() {
      // Clear canvas
      ctx.fillStyle = '#f0f0f0';
      ctx.fillRect(0, 0
