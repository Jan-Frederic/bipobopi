name: Deploy Angular to GitHub Pages
on:
 push:
   branches: ['main']
jobs:
 build-deploy:
   runs-on: ubuntu-latest
   steps:
     - uses: actions/checkout@v4
     - uses: actions/setup-node@v4
       with:
         node-version: '20.x'
     - run: npm install
     - run: npm run build -- --configuration production --base-href=/bipobopi/
     - run: npx angular-cli-ghpages --dir=dist/bipobopi --message="Deploy to GitHub Pages"
       env:
         GH_TOKEN: ${{ secrets.GH_TOKEN }}
         
